server {
    listen 80;
    listen [::]:80;
    server_name d31337m3.com www.d31337m3.com;
    return 301 https://$host$request_uri;
}

# Admin subdomain redirect
server {
    listen 80;
    listen [::]:80;
    server_name admin.d31337m3.com;
    return 301 https://d31337m3.com/admin;
}

# HTTPS Server Block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name d31337m3.com www.d31337m3.com;

    ssl_certificate /etc/letsencrypt/live/d31337m3.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/d31337m3.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/d31337m3.access.log;
    error_log /var/log/nginx/d31337m3.error.log;

    # Internal preview cookie setter (for testing window access).
    location = /internal-access-d31337m3 {
        add_header Set-Cookie "d31337m3_preview=1; Path=/; Max-Age=1209600; HttpOnly; SameSite=Lax" always;
        return 302 /;
    }

    location = /internal-logout-d31337m3 {
        add_header Set-Cookie "d31337m3_preview=deleted; Path=/; Max-Age=0; HttpOnly; SameSite=Lax" always;
        return 302 /login;
    }

    # Public launch/coming-soon page during internal test window.
    location = /launch {
        root /home/D31337m3/Orm_d31337m3;
        try_files /launch_waitlist.html =404;
        add_header Cache-Control "no-store" always;
    }

    # Serve production frontend build directly (no dev server / websocket).
    root /home/D31337m3/Orm_d31337m3/frontend/build;
    index index.html;

    # Public auth UI routes (must bypass preview cookie gate).
    location = /login {
        try_files /index.html =404;
    }

    location = /register {
        try_files /index.html =404;
    }

    # Static assets from frontend build output.
    location ^~ /static/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location = /favicon.ico {
        try_files /favicon.ico =404;
    }

    # Public auth endpoints (login, register, reset password) - no preview cookie required
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8002/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Proxy other API requests to the microservices orchestrator.
    location /api/ {
        proxy_pass http://127.0.0.1:8006/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Frontend SPA fallback route.
    location / {
        try_files $uri /index.html;
    }
}
