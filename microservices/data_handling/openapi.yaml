openapi: 3.0.3
info:
  title: Data Handling Service
  version: 1.0.0
  description: Responsible for database interactions, scraping, indexing, and data pipelines
servers:
  - url: http://localhost:8003
    description: Development server
paths:
  /data/brokers:
    get:
      summary: Get list of data brokers
      operationId: getDataBrokers
      responses:
        '200':
          description: List of data brokers
          content:
            application/json:
              schema:
                type: object
                properties:
                  brokers:
                    type: array
                    items:
                      type: string
  /data/findings:
    get:
      summary: Get findings for a user
      operationId: getUserFindings
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Findings retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  findings:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        user_id:
                          type: string
                        broker:
                          type: string
                        status:
                          type: string
                          enum: [pending, in_progress, completed, failed]
                        created_at:
                          type: string
                          format: date-time
        '404':
          description: No findings found
  /data/findings:
    post:
      summary: Create a new finding
      operationId: createFinding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - broker
              properties:
                user_id:
                  type: string
                broker:
                  type: string
      responses:
        '201':
          description: Finding created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  user_id:
                    type: string
                  broker:
                    type: string
                  status:
                    type: string
                    default: pending
                  created_at:
                    type: string
                    format: date-time
        '400':
          description: Bad request
  /data/scrape:
    post:
      summary: Trigger scraping job
      operationId: triggerScraping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - broker
              properties:
                user_id:
                  type: string
                broker:
                  type: string
      responses:
        '202':
          description: Scraping job triggered
        '400':
          description: Bad request
  /data/index:
    post:
      summary: Trigger indexing job
      operationId: triggerIndexing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
      responses:
        '202':
          description: Indexing job triggered
        '400':
          description: Bad request
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
