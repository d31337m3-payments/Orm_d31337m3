openapi: 3.0.3
info:
  title: Client Index Service
  version: 1.0.0
  description: User database service with secure storage and credential handling
servers:
  - url: http://localhost:8001
    description: Development server
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                name:
                  type: string
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                  name:
                    type: string
                  created_at:
                    type: string
                    format: date-time
        '400':
          description: Bad request
        '409':
          description: User already exists
  /auth/login:
    post:
      summary: Authenticate user and issue token
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    enum: [Bearer]
                  expires_in:
                    type: integer
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
                      is_admin:
                        type: boolean
        '401':
          description: Invalid credentials
  /users/{user_id}:
    get:
      summary: Get user profile
      operationId: getUserProfile
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                  name:
                    type: string
                  plan_id:
                    type: string
                  subscription_status:
                    type: string
                  is_active:
                    type: boolean
                  created_at:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
    put:
      summary: Update user profile
      operationId: updateUserProfile
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: User profile updated
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
  /users/{user_id}/plan:
    put:
      summary: Update user subscription plan
      operationId: updateUserPlan
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - plan_id
              properties:
                plan_id:
                  type: string
                  enum: [basic, pro, enterprise]
      responses:
        '200':
          description: User plan updated
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
        '400':
          description: Invalid plan
  # Service-to-service endpoints
  /internal/users/{user_id}/verify:
    get:
      summary: Verify user exists (service-to-service)
      operationId: verifyUserExists
      security:
        - serviceAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                  user_id:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: User not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    serviceAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
